<h1 class="text-3xl font-bold font-montserrat">All Products</h1>
<h2 class="text-xl">For all genders</h2>

@if (productsResource.isLoading()) {
  <div class="flex justify-center items-center h-screen">
    <span class="loading loading-spinner loading-lg"></span>
  </div>
}

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mt-4 gap-3">
  @for (product of productsResource.value()?.products; track product.id) {
    <product-card [product]="product"></product-card>
  } @empty {
    <h2 class="text-xl">No products found</h2>
  }
</div>

<app-pagination
  [pages]="productsResource.value()?.pages ?? 0"
  [currentPage]="paginationService.currentPage()"
/>
